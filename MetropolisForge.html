<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>City Builder – Detailed Buildings | Bridges | Citizens & Cars</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px); border-radius: 16px; padding: 12px 20px;
            color: white; border-left: 4px solid #ffaa44; pointer-events: none; z-index: 10;

        }
        #stats { display: flex; gap: 24px; flex-wrap: wrap; font-size: 14px; }
        .stat span { color: #ffaa44; font-size: 18px; margin-left: 6px; }
        #tools {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border-radius: 50px;
            padding: 10px 20px; display: flex; gap: 12px; z-index: 20;
            border: 1px solid rgba(255,170,68,0.5); pointer-events: auto;
            justify-content: center; align-items: center;
            flex-wrap: wrap;
        }
        .tool-btn {
            background: #2c3e50; border: none; color: white; padding: 8px 18px;
            border-radius: 40px; font-size: 13px; font-weight: bold; cursor: pointer;
            transition: 0.2s; font-family: inherit; display: inline-flex; align-items: center;
            gap: 6px; white-space: nowrap;
        }
        .tool-btn.active { background: #ffaa44; color: #1a1a2e; box-shadow: 0 0 10px #ffaa44; }
        .tool-btn.road-btn { background: #5a626e; }
        .tool-btn.del-btn { background: #a53f2b; }
        .tool-btn.inspect-btn { background: #2c6e2c; }
        .dropdown-group {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 40px;
        }
        .dropdown-group label { font-size: 12px; color: #ffaa44; font-weight: bold; white-space: nowrap; }
        select {
            background: #2c3e50; border: none; color: white; padding: 6px 12px;
            border-radius: 40px; font-size: 13px; font-weight: bold; cursor: pointer;
            font-family: inherit; outline: none; min-width: 120px;
        }
        @media (max-width: 1000px) {
            select { min-width: 110px; font-size: 12px; }
            .tool-btn { padding: 6px 12px; font-size: 12px; }
        }
        @media (max-width: 800px) {
            #tools { flex-wrap: wrap; }
            select { min-width: 100px; font-size: 11px; }
            .dropdown-group label { font-size: 10px; }
        }
        #current-tool-label { font-size: 12px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 20px; color: #ffaa44; margin-left: 10px; white-space: nowrap; }
        #mute-btn { background: #2c3e50; border: none; color: white; padding: 6px 12px; border-radius: 40px; font-size: 12px; cursor: pointer; margin-left: 10px; }
        #info { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 8px; font-size: 12px; color: #ccc; pointer-events: none; font-family: monospace; }
        #tooltip { position: absolute; background: rgba(0,0,0,0.85); color: #ffdd99; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; pointer-events: none; z-index: 100; white-space: nowrap; backdrop-filter: blur(4px); border: 1px solid #ffaa44; display: none; }
        .event-notification { position: absolute; background: rgba(0,0,0,0.8); color: #ffaa44; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; pointer-events: none; z-index: 200; white-space: nowrap; animation: fadeOut 2s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }
    </style>
</head>

    <div class="dropdown-group"><label>🏘️ Zones</label><select id="zone-select"><option value="residential">🏘️ House ($100)</option><option value="commercial">🏪 Store ($100)</option><option value="industrial">🏭 Factory ($100)</option></select></div>
    <div class="dropdown-group"><label>🌿 Parks & Nature</label><select id="nature-select"><option value="park">🌳 Park (2x2) ($400)</option><option value="fountain">💧 Fountain ($150)</option><option value="waterpump">🚰 Water Pump ($200)</option><option value="pier">🎣 Fishing Pier (2x1) ($300)</option></select></div>
    <div class="dropdown-group"><label>🏛️ Services & Civic</label><select id="civic-service-select"><option value="police">👮 Police (2x1) ($500)</option><option value="fire">🔥 Fire (2x1) ($500)</option><option value="school">🏫 School (2x2) ($600)</option><option value="hospital">🏥 Hospital (2x2) ($700)</option><option value="library">📖 Library (1x1) ($250)</option><option value="powerplant">⚡ Power Plant (2x2) ($800)</option></select></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// --- Audio ---
let audioCtx = null, muted = false;
const muteBtn = document.getElementById('mute-btn');
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playSound(type) {
    if (muted || !audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    if (type === 'build') { osc.frequency.value = 660; gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08); osc.start(); osc.stop(now + 0.08); }
    else if (type === 'footstep') { osc.frequency.value = 330; gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05); osc.start(); osc.stop(now + 0.05); }
}
muteBtn.addEventListener('click', () => { muted = !muted; muteBtn.textContent = muted ? '🔇 Unmute' : '🔊 Mute'; if (!audioCtx && !muted) initAudio(); });
window.addEventListener('click', () => { if (!audioCtx && !muted) initAudio(); }, { once: true });

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1030);
scene.fog = new THREE.FogExp2(0x0a1030, 0.005);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(15, 12, 18);
camera.lookAt(0, 0, 0);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.left = '0px';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05; controls.screenSpacePanning = true; controls.maxPolarAngle = Math.PI / 2.3;

// --- Lighting ---
scene.add(new THREE.AmbientLight(0x404060));
const sun = new THREE.DirectionalLight(0xfff5d1, 1.2); sun.position.set(10, 20, 5); sun.castShadow = true; sun.shadow.mapSize.width = 1024; sun.shadow.mapSize.height = 1024; scene.add(sun);
scene.add(new THREE.PointLight(0x5577aa, 0.4).position.set(0,5,0));
scene.add(new THREE.PointLight(0xffaa66, 0.3).position.set(-5,8,-8));

// --- Ground with 0.5 grid lines (1x1 cells) ---
const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a8c3f, roughness: 0.9 });
const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), groundMat);
groundPlane.rotation.x = -Math.PI / 2; groundPlane.position.y = -0.2; groundPlane.receiveShadow = true;
scene.add(groundPlane);
const gridHelper = new THREE.GridHelper(20, 40, 0x88aaff, 0x88aaff);
gridHelper.position.y = -0.08;
gridHelper.material.transparent = true;
gridHelper.material.opacity = 0.5;
scene.add(gridHelper);

// --- Water: 1 river + 2 lakes ---
const waterCells = new Set();
function addWaterTile(x,z) {
    if (x < -10 || x > 10 || z < -10 || z > 10) return;
    const key = `${x},${z}`;
    if (waterCells.has(key)) return;
    waterCells.add(key);
    const waterMat = new THREE.MeshStandardMaterial({ color: 0x3399ff, roughness: 0.2, metalness: 0.9, emissive: 0x004466 });
    const waterPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.96, 0.96), waterMat);
    waterPlane.rotation.x = -Math.PI / 2; waterPlane.position.set(x, -0.15, z); waterPlane.receiveShadow = true;
    scene.add(waterPlane);
    const rippleMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3 });
    const ripple = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.9), rippleMat);
    ripple.rotation.x = -Math.PI / 2; ripple.position.set(x, -0.12, z);
    scene.add(ripple);
}
// River
for (let x = -9; x <= 9; x += 0.6) {
    let z = Math.sin(x * 0.6) * 2.0 + Math.sin(x * 1.3) * 0.6;
    z = Math.min(8, Math.max(-8, Math.round(z)));
    for (let dx = -1; dx <= 1; dx++) addWaterTile(Math.round(x), z);
}
// Lake 1
for (let dx = -2; dx <= 2; dx++) for (let dz = -2; dz <= 2; dz++) if (Math.hypot(dx,dz) <= 1.8) addWaterTile(-4 + dx, 4 + dz);
// Lake 2
for (let dx = -2; dx <= 2; dx++) for (let dz = -2; dz <= 2; dz++) if (Math.hypot(dx,dz) <= 2.0) addWaterTile(5 + dx, -3 + dz);

// --- Game Data ---
const roads = new Map();
const zones = new Map();
const zoneMarkers = new Map();
const buildings = new Map();
const buildingMeshes = [];
const parks = new Map(); let nextParkId = 1; const parkObjects = new Map();
const fountains = new Map();
const waterPumps = new Map();
const piers = new Map(); let nextPierId = 1; const pierObjects = new Map();
const services = new Map(); let nextServiceId = 1; const serviceObjects = new Map();
const schools = new Map(); let nextSchoolId = 1; const schoolObjects = new Map();
const hospitals = new Map(); let nextHospitalId = 1; const hospitalObjects = new Map();
const libraries = new Map(); let nextLibraryId = 1; const libraryObjects = new Map();
const powerPlants = new Map(); let nextPowerPlantId = 1; const powerPlantObjects = new Map();

let cars = [], citizens = [];
let money = 50000, totalPop = 0, happiness = 50;
let currentTool = 'road', currentRotation = 0;
let lastFrameTime = performance.now(), lastCarSpawn = 0, lastCitizenSpawn = 0;

const ROAD_COST = 25, ZONE_COST = 100, PARK_COST = 400, PARK_HAPPINESS = 12, FOUNTAIN_COST = 150, FOUNTAIN_HAPPINESS = 8, WATER_PUMP_COST = 200, WATER_PUMP_HAPPINESS = 5, WATER_PUMP_INCOME = 5, PIER_COST = 300, PIER_HAPPINESS = 8, PIER_INCOME = 6, SERVICE_COST = 500, SERVICE_HAPPINESS = 10, SERVICE_MAINTENANCE = 20;
const SCHOOL_COST = 600, SCHOOL_HAPPINESS = 12, SCHOOL_MAINTENANCE = 15;
const HOSPITAL_COST = 700, HOSPITAL_HAPPINESS = 15, HOSPITAL_MAINTENANCE = 25;
const LIBRARY_COST = 250, LIBRARY_HAPPINESS = 8, LIBRARY_MAINTENANCE = 5;
const POWERPLANT_COST = 800, POWERPLANT_HAPPINESS = -5, POWERPLANT_INCOME = 40, POWERPLANT_MAINTENANCE = 35;

const ZONE_COLORS = { residential: 0x6fbf73, commercial: 0x5b9bd5, industrial: 0xd97c2b };
const BUILDING_DATA = {
    residential: { name: 'House', basePop: [0,8,16,28], baseIncome: [0,2,6,12], color: 0x6fbf73, heights: [0.2,0.7,1.0,1.3], roofColor: 0xbc9a6c },
    commercial: { name: 'Store', basePop: [0,3,8,15], baseIncome: [0,5,12,25], color: 0x5b9bd5, heights: [0.2,0.9,1.3,1.7], roofColor: 0x3a6ea5 },
    industrial: { name: 'Factory', basePop: [0,1,4,10], baseIncome: [0,8,18,32], color: 0xd97c2b, heights: [0.2,0.8,1.2,1.5], roofColor: 0x8b5a2b, happinessPenalty: [-1,-2,-3,-4] }
};
const GROWTH_TIMES = { 0: 30000, 1: 60000, 2: 100000 };
const CAR_SPEED = 2.5, CAR_SPAWN_INTERVAL = 2500, MAX_CARS = 25;
const CITIZEN_SPEED = 1.2;
let MAX_CITIZENS = 20, CITIZEN_SPAWN_INTERVAL = 7000;

function getKey(x,z) { return `${x},${z}`; }
function isRoad(x,z) { return roads.has(getKey(x,z)); }
function isZone(x,z) { return zones.has(getKey(x,z)); }
function isPark(x,z) { return parks.has(getKey(x,z)); }
function isFountain(x,z) { return fountains.has(getKey(x,z)); }
function isWaterPump(x,z) { return waterPumps.has(getKey(x,z)); }
function isPier(x,z) { return piers.has(getKey(x,z)); }
function isService(x,z) { return services.has(getKey(x,z)); }
function isSchool(x,z) { return schools.has(getKey(x,z)); }
function isHospital(x,z) { return hospitals.has(getKey(x,z)); }
function isLibrary(x,z) { return libraries.has(getKey(x,z)); }
function isPowerPlant(x,z) { return powerPlants.has(getKey(x,z)); }
function isWater(x,z) { return waterCells.has(getKey(x,z)); }
function isOccupied(x,z) { return isRoad(x,z)||isZone(x,z)||isPark(x,z)||isFountain(x,z)||isWaterPump(x,z)||isPier(x,z)||isService(x,z)||isSchool(x,z)||isHospital(x,z)||isLibrary(x,z)||isPowerPlant(x,z); }
function hasRoadAdjacent(x,z) { for (let [dx,dz] of [[1,0],[-1,0],[0,1],[0,-1]]) if (isRoad(x+dx,z+dz)) return true; return false; }
function getRoadNeighbors(x,z) { let n=[]; for (let [dx,dz] of [[0,1],[0,-1],[1,0],[-1,0]]) if (isRoad(x+dx,z+dz)) n.push([x+dx,z+dz]); return n; }
function findPath(sx,sz,ex,ez) {
    let q=[[sx,sz]], from=new Map(), seen=new Set(); seen.add(getKey(sx,sz));
    while (q.length) {
        let [x,z]=q.shift();
        if (x===ex && z===ez) { let path=[[ex,ez]], cur=getKey(ex,ez); while (from.has(cur)) { let p=from.get(cur); path.unshift(p); cur=getKey(p[0],p[1]); } return path; }
        for (let [nx,nz] of getRoadNeighbors(x,z)) { let k=getKey(nx,nz); if (!seen.has(k)) { seen.add(k); from.set(k,[x,z]); q.push([nx,nz]); } }
    }
    return null;
}
function updateZoneMarker(x,z,type) {
    let key=getKey(x,z);
    if (zoneMarkers.has(key)) scene.remove(zoneMarkers.get(key));
    zoneMarkers.delete(key);
    if (type) {
        let plane = new THREE.Mesh(new THREE.PlaneGeometry(0.96, 0.96), new THREE.MeshStandardMaterial({ color: ZONE_COLORS[type], transparent: true, opacity: 0.7 }));
        plane.rotation.x = -Math.PI/2; plane.position.set(x,-0.03,z); scene.add(plane);
        zoneMarkers.set(key, plane);
    }
}
// --- HIGHLY DETAILED BUILDINGS ---
function createDetailedBuilding(type, x, z, level, eventType) {
    const d = BUILDING_DATA[type];
    const group = new THREE.Group();
    const tint = eventType === '🔥 Fire!' ? 0xff6633 : (eventType === '💰 Robbery!' ? 0xaa66ff : null);
    if (level === 0) {
        const base = new THREE.Mesh(new THREE.BoxGeometry(0.96, 0.15, 0.96), new THREE.MeshStandardMaterial({ color: tint || 0xaa8866 }));
        base.position.y = 0.075; base.castShadow = true; group.add(base);
    } else {
        const height = d.heights[level];
        const bodyMat = new THREE.MeshStandardMaterial({ color: tint || d.color });
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.96, height, 0.96), bodyMat);
        body.position.y = height/2; body.castShadow = true; group.add(body);
        
        if (type === 'residential') {
            const roof = new THREE.Mesh(new THREE.ConeGeometry(0.6, 0.45, 4), new THREE.MeshStandardMaterial({ color: d.roofColor }));
            roof.position.y = height+0.2; group.add(roof);
            const chimney = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.45, 0.2), new THREE.MeshStandardMaterial({ color: 0xaa8c64 }));
            chimney.position.set(0.35, height+0.1, 0.35); group.add(chimney);
            const door = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.05), new THREE.MeshStandardMaterial({ color: 0x8B5A2B }));
            door.position.set(-0.25, 0.2, 0.48); group.add(door);
            const winMat = new THREE.MeshStandardMaterial({ color: 0x88aaff });
            const win1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.25, 0.05), winMat); win1.position.set(0.3, height*0.7, 0.48); group.add(win1);
            const win2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.25, 0.05), winMat); win2.position.set(-0.3, height*0.7, 0.48); group.add(win2);
            const sideWin = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.05), winMat); sideWin.position.set(0.48, height*0.6, -0.2); group.add(sideWin);
        } 
        else if (type === 'commercial') {
            const roof = new THREE.Mesh(new THREE.BoxGeometry(0.98, 0.12, 0.98), new THREE.MeshStandardMaterial({ color: 0xccccdd })); roof.position.y = height+0.05; group.add(roof);
            const awning = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.08, 0.3), new THREE.MeshStandardMaterial({ color: 0xdd5533 })); awning.position.set(0, height*0.4, 0.49); group.add(awning);
            const sign = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.15, 0.05), new THREE.MeshStandardMaterial({ color: 0xffaa55 })); sign.position.set(0, height*0.75, 0.49); group.add(sign);
            const display = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.4, 0.05), new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x224466 })); display.position.set(0, height*0.3, 0.48); group.add(display);
        } 
        else {
            const roof = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.7, 0.3, 6), new THREE.MeshStandardMaterial({ color: 0xab8e5c })); roof.position.y = height+0.1; group.add(roof);
            const stack = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.25, 0.8, 8), new THREE.MeshStandardMaterial({ color: 0x7a5a3a })); stack.position.set(0.45, height+0.25, -0.4); group.add(stack);
            const smokeMat = new THREE.MeshStandardMaterial({ color: 0x888888, emissive: 0x222222 });
            const smoke = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4,4), smokeMat); smoke.position.set(0.45, height+0.65, -0.4); group.add(smoke);
            const vent = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.3), new THREE.MeshStandardMaterial({ color: 0xcc8855 })); vent.position.set(-0.45, height-0.1, 0.35); group.add(vent);
        }
    }
    group.position.set(x,0,z);
    const hoverBox = new THREE.Mesh(new THREE.BoxGeometry(0.96, 1.2, 0.96), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 })); hoverBox.position.y = 0.6; group.add(hoverBox);
    return group;
}
function createLabel(type,x,z,level,percent,hasRoad,eventType) {
    const d = BUILDING_DATA[type];
    const evIcon = eventType === '🔥 Fire!' ? '🔥 ' : (eventType === '💰 Robbery!' ? '💰 ' : '');
    let text = '';
    if (!hasRoad && level<3) text = level===0 ? `🚧 ${d.name} (no road)` : `${d.name} Lv${level} (no road)`;
    else if (level===0) text = `${evIcon}🚧 ${d.name} Lv0 → Lv1: ${percent}%`;
    else if (level===1) text = `${evIcon}${d.name} Lv1 → Lv2: ${percent}%`;
    else if (level===2) text = `${evIcon}${d.name} Lv2 → Lv3: ${percent}%`;
    else text = `${evIcon}${d.name} Lv3 ✓`;
    const div = document.createElement('div'); div.textContent = text; div.style.cssText = 'color:#ffdd99; font-size:10px; font-weight:bold; background:rgba(0,0,0,0.6); padding:2px 6px; border-radius:12px; white-space:nowrap';
    const label = new CSS2DObject(div);
    label.position.set(x, (level===0?0.6:d.heights[level]+0.5), z);
    return label;
}
function updateBuilding(x,z,forceLevel=null,eventType=null) {
    const key = getKey(x,z);
    const zoneType = zones.get(key);
    if (!zoneType) {
        const idx = buildingMeshes.findIndex(i=>i.buildingKey===key);
        if (idx!==-1) { scene.remove(buildingMeshes[idx].mesh); buildingMeshes.splice(idx,1); }
        if (buildings.has(key)) { const old = buildings.get(key); scene.remove(old.mesh); if (old.label) scene.remove(old.label); buildings.delete(key); }
        return;
    }
    let level = forceLevel !== null ? forceLevel : (buildings.has(key) ? buildings.get(key).level : 0);
    if (!hasRoadAdjacent(x,z) && level>0) level = 0;

function updateAllLabels(now) { 
    for (let [key,b] of buildings.entries()) {
        const [x,z] = key.split(',').map(Number);
        const hr = hasRoadAdjacent(x,z);
        let pct = 0;
        if (hr && b.level<3) pct = Math.min(100, Math.floor(((now - b.lastUpdate)/GROWTH_TIMES[b.level])*100));
        let ev = b.eventType;
        if (b.eventUntil && now > b.eventUntil) { ev = null; b.eventUntil = null; b.eventType = null; updateBuilding(x,z,b.level,null); continue; }
        const d = BUILDING_DATA[b.type];
        const evIcon = ev === '🔥 Fire!' ? '🔥 ' : (ev === '💰 Robbery!' ? '💰 ' : '');
        let text = '';
        if (!hr && b.level<3) text = b.level===0 ? `🚧 ${d.name} (no road)` : `${d.name} Lv${b.level} (no road)`;
        else if (b.level===0) text = `${evIcon}🚧 ${d.name} Lv0 → Lv1: ${pct}%`;
        else if (b.level===1) text = `${evIcon}${d.name} Lv1 → Lv2: ${pct}%`;
        else if (b.level===2) text = `${evIcon}${d.name} Lv2 → Lv3: ${pct}%`;
        else text = `${evIcon}${d.name} Lv3 ✓`;
        b.label.element.textContent = text;
        b.label.position.y = b.level===0 ? 0.6 : d.heights[b.level]+0.5;
    }
}

function updateGrowth(now) {
    for (let [key,b] of buildings.entries()) {
        const [x,z] = key.split(',').map(Number);
        if (!hasRoadAdjacent(x,z)) continue;
        let nl = b.level;
        if (b.level===0 && now-b.lastUpdate > GROWTH_TIMES[0]) nl = 1;
        else if (b.level===1 && now-b.lastUpdate > GROWTH_TIMES[1]) nl = 2;
        else if (b.level===2 && now-b.lastUpdate > GROWTH_TIMES[2]) nl = 3;

    }
}

function validatePlacement(tool, x, z, rot) {
    if (tool === 'inspect') return true;
    if (tool === 'road') return (x>=-10&&x<=10&&z>=-10&&z<=10 && !isZone(x,z)&&!isPark(x,z)&&!isFountain(x,z)&&!isWaterPump(x,z)&&!isPier(x,z)&&!isService(x,z)&&!isSchool(x,z)&&!isHospital(x,z)&&!isLibrary(x,z)&&!isPowerPlant(x,z) && money>=ROAD_COST);
    if (['residential','commercial','industrial'].includes(tool)) return (x>=-10&&x<=10&&z>=-10&&z<=10 && !isOccupied(x,z)&&!isWater(x,z) && hasRoadAdjacent(x,z) && money>=ZONE_COST);
    if (tool === 'park') {
        const tiles = [[x,z],[x+1,z],[x,z+1],[x+1,z+1]];
        for (let [ix,iz] of tiles) if (ix<-10||ix>10||iz<-10||iz>10||isOccupied(ix,iz)||isWater(ix,iz)) return false;
        let ok=false; for (let [ix,iz] of tiles) if (hasRoadAdjacent(ix,iz)) ok=true;
        return ok && money>=PARK_COST;
    }
    if (tool === 'fountain') return !isOccupied(x,z) && !isWater(x,z) && hasRoadAdjacent(x,z) && money>=FOUNTAIN_COST;
    if (tool === 'waterpump') return isWater(x,z) && !isOccupied(x,z) && money>=WATER_PUMP_COST;
    if (tool === 'pier') {
        let w=rot===0?2:1,d=rot===0?1:2;
        for(let i=0;i<w;i++) for(let j=0;j<d;j++){ let nx=x+i, nz=z+j; if(nx<-10||nx>10||nz<-10||nz>10||!isWater(nx,nz)||isOccupied(nx,nz)) return false; }
        let ok=false; for(let i=0;i<w;i++) for(let j=0;j<d;j++) if(hasRoadAdjacent(x+i,z+j)) ok=true;
        return ok && money>=PIER_COST;
    }
    if (tool==='police'||tool==='fire') {
        let w=rot===0?2:1,d=rot===0?1:2;
        for(let i=0;i<w;i++) for(let j=0;j<d;j++) if(isOccupied(x+i,z+j)||isWater(x+i,z+j)) return false;
        let ok=false; for(let i=0;i<w;i++) for(let j=0;j<d;j++) if(hasRoadAdjacent(x+i,z+j)) ok=true;
        return ok && money>=SERVICE_COST;
    }
    if (tool==='school'||tool==='hospital'||tool==='powerplant') {
        let size=2;
        for(let i=0;i<size;i++) for(let j=0;j<size;j++) if(isOccupied(x+i,z+j)||isWater(x+i,z+j)) return false;
        let ok=false; for(let i=0;i<size;i++) for(let j=0;j<size;j++) if(hasRoadAdjacent(x+i,z+j)) ok=true;
        let cost = tool==='school'?SCHOOL_COST:(tool==='hospital'?HOSPITAL_COST:POWERPLANT_COST);
        return ok && money>=cost;
    }
    if (tool==='library') return !isOccupied(x,z) && !isWater(x,z) && hasRoadAdjacent(x,z) && money>=LIBRARY_COST;
    return false;
}
function updatePreview(x,z) {
    if (currentTool === 'demolish' || currentTool === 'inspect') { clearPreview(); return; }
    const isValid = validatePlacement(currentTool, x, z, currentRotation);
    const ghost = createGhostPreview(currentTool, x, z, currentRotation, isValid);
    if (currentPreview) scene.remove(currentPreview);
    currentPreview = ghost;
    if (ghost) scene.add(ghost);
}
let currentHoveredNonZone = null;
function hideAllNonZoneLabels() {
    parkObjects.forEach(obj=>{if(obj.label) obj.label.visible=false});
    fountains.forEach(obj=>{if(obj.label) obj.label.visible=false});
    waterPumps.forEach(obj=>{if(obj.label) obj.label.visible=false});
    pierObjects.forEach(obj=>{if(obj.label) obj.label.visible=false});
    serviceObjects.forEach(obj=>{if(obj.label) obj.label.visible=false});
    schoolObjects.forEach(obj=>{if(obj.label) obj.label.visible=false});
    hospitalObjects.forEach(obj=>{if(obj.label) obj.label.visible=false});
    libraryObjects.forEach(obj=>{if(obj.label) obj.label.visible=false});
    powerPlantObjects.forEach(obj=>{if(obj.label) obj.label.visible=false});
}
const hoverRaycaster = new THREE.Raycaster();
function onMouseMoveTooltip(event) {
    const mouse = new THREE.Vector2();
    mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
    mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
    hoverRaycaster.setFromCamera(mouse, camera);
    const allMeshes = [];
    const meshToLabel = new Map();
    parkObjects.forEach(obj=>{ allMeshes.push(obj.mesh); meshToLabel.set(obj.mesh, obj.label); });
    fountains.forEach(obj=>{ allMeshes.push(obj.mesh); meshToLabel.set(obj.mesh, obj.label); });
    waterPumps.forEach(obj=>{ allMeshes.push(obj.mesh); meshToLabel.set(obj.mesh, obj.label); });
    pierObjects.forEach(obj=>{ allMeshes.push(obj.mesh); meshToLabel.set(obj.mesh, obj.label); });
    serviceObjects.forEach(obj=>{ allMeshes.push(obj.mesh); meshToLabel.set(obj.mesh, obj.label); });
    schoolObjects.forEach(obj=>{ allMeshes.push(obj.mesh); meshToLabel.set(obj.mesh, obj.label); });
    hospitalObjects.forEach(obj=>{ allMeshes.push(obj.mesh); meshToLabel.set(obj.mesh, obj.label); });
    libraryObjects.forEach(obj=>{ allMeshes.push(obj.mesh); meshToLabel.set(obj.mesh, obj.label); });
    powerPlantObjects.forEach(obj=>{ allMeshes.push(obj.mesh); meshToLabel.set(obj.mesh, obj.label); });
    const hits = hoverRaycaster.intersectObjects(allMeshes);
    if (hits.length) {
        const label = meshToLabel.get(hits[0].object);
        if (label && label !== currentHoveredNonZone) {
            hideAllNonZoneLabels();
            label.visible = true;
            currentHoveredNonZone = label;
        }
        return;
    }
    if (currentHoveredNonZone) { hideAllNonZoneLabels(); currentHoveredNonZone = null; }
}
const rayPlane = new THREE.Plane(new THREE.Vector3(0,1,0),0);
const clickRaycaster = new THREE.Raycaster();
function getTile(event) { let mouse=new THREE.Vector2(); mouse.x=(event.clientX/renderer.domElement.clientWidth)*2-1; mouse.y=-(event.clientY/renderer.domElement.clientHeight)*2+1; clickRaycaster.setFromCamera(mouse,camera); let point=new THREE.Vector3(); if(clickRaycaster.ray.intersectPlane(rayPlane,point)){ let x=Math.round(point.x),z=Math.round(point.z); x=Math.min(10,Math.max(-10,x)); z=Math.min(10,Math.max(-10,z)); return{x,z}; } return null; }
function onCanvasClick(event){ let tile=getTile(event); if(!tile) return; if(currentTool==='road') placeRoad(tile.x,tile.z); else if(currentTool==='demolish') demolishAt(tile.x,tile.z); else if(currentTool==='inspect') { /* do nothing */ } else if(currentTool==='residential') placeZone(tile.x,tile.z,'residential'); else if(currentTool==='commercial') placeZone(tile.x,tile.z,'commercial'); else if(currentTool==='industrial') placeZone(tile.x,tile.z,'industrial'); else if(currentTool==='park') placePark(tile.x,tile.z); else if(currentTool==='fountain') placeFountain(tile.x,tile.z); else if(currentTool==='waterpump') placeWaterPump(tile.x,tile.z); else if(currentTool==='pier') placePier(tile.x,tile.z,currentRotation); else if(currentTool==='police') placeService(tile.x,tile.z,'police'); else if(currentTool==='fire') placeService(tile.x,tile.z,'fire'); else if(currentTool==='school') placeSchool(tile.x,tile.z); else if(currentTool==='hospital') placeHospital(tile.x,tile.z); else if(currentTool==='library') placeLibrary(tile.x,tile.z); else if(currentTool==='powerplant') placePowerPlant(tile.x,tile.z); updatePreview(tile.x,tile.z); }
function onMouseMove(event){ let tile=getTile(event); if(tile) updatePreview(tile.x,tile.z); else clearPreview(); onMouseMoveTooltip(event); }
function onKeyDown(e){ if(e.key==='r'||e.key==='R'){ if(currentTool==='pier'||currentTool==='police'||currentTool==='fire'){ currentRotation=currentRotation===0?1:0; let tile=getTile(new MouseEvent('mousemove')); if(tile) updatePreview(tile.x,tile.z); } } }
const roadBtnUI=document.getElementById('btnRoad'), delBtnUI=document.getElementById('btnDel'), inspectBtnUI=document.getElementById('btnInspect');
const zoneSelect=document.getElementById('zone-select'), natureSelect=document.getElementById('nature-select'), civicSelect=document.getElementById('civic-service-select');
function setActiveTool(tool){ currentTool=tool; currentRotation=0; roadBtnUI.classList.remove('active'); delBtnUI.classList.remove('active'); inspectBtnUI.classList.remove('active'); if(tool==='road') roadBtnUI.classList.add('active'); else if(tool==='demolish') delBtnUI.classList.add('active'); else if(tool==='inspect') inspectBtnUI.classList.add('active'); clearPreview(); document.getElementById('current-tool-label').textContent=`🔨 ${tool} Tool`; }
roadBtnUI.addEventListener('click',()=>setActiveTool('road')); delBtnUI.addEventListener('click',()=>setActiveTool('demolish')); inspectBtnUI.addEventListener('click',()=>setActiveTool('inspect'));
zoneSelect.addEventListener('change',()=>setActiveTool(zoneSelect.value)); natureSelect.addEventListener('change',()=>setActiveTool(natureSelect.value)); civicSelect.addEventListener('change',()=>setActiveTool(civicSelect.value)); setActiveTool('road');
window.addEventListener('mousemove',onMouseMove); window.addEventListener('click',onCanvasClick); window.addEventListener('keydown',onKeyDown);
window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); labelRenderer.setSize(window.innerWidth,window.innerHeight); });
// Stars
let starsGeo=new THREE.BufferGeometry(); let starsPos=[]; for(let i=0;i<1200;i++){ starsPos.push((Math.random()-0.5)*500); starsPos.push((Math.random()-0.5)*100+30); starsPos.push((Math.random()-0.5)*200-100); } starsGeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(starsPos),3)); scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xcceeff,size:0.2})));
function animate() { controls.update(); renderer.render(scene,camera); labelRenderer.render(scene,camera); requestAnimationFrame(animate); }
// Starter roads with bridge + correct park
setTimeout(() => {
    let starter = [[0,0],[1,0],[-1,0],[0,1],[0,-1]];
    for(let [x,z] of starter) if(!isOccupied(x,z)) placeRoad(x,z);
    placeRoad(2,-2); placeRoad(2,-1); placeRoad(2,0); placeRoad(2,1); placeRoad(2,2);
    setTimeout(() => {
        placeZone(1,1,'residential'); placeZone(-1,1,'residential'); placeZone(1,-1,'commercial'); placeZone(3,0,'industrial');
        // Park at (0,0) with trees correctly centered on each tile
        placePark(0, 0);
    }, 200);
}, 100);
recalcStats(); animate(); requestAnimationFrame(gameLoop); lastFrameTime=performance.now();
