<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Games · Evanz Lee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            scroll-behavior: smooth;
        }

        body {
            min-height: 100%;
            background: #f0f4f9;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            font-weight: 500;
            color: #111827;
            font-size: 15px;
            line-height: 1.55;
            padding-bottom: 60px;
        }

        /* ===== NAVIGATION BAR - 50% HEIGHT (matching secondpage) ===== */
        .nav-bar {
            position: fixed;
            left: 20px;
            top: 25%;
            transform: translateY(-25%);
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            gap: 6px;
            z-index: 1000;
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(10px);
            padding: 12px 10px;
            border-radius: 44px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border: 1px solid rgba(255,255,255,0.6);
            overflow-y: auto;
        }

        .nav-bar::-webkit-scrollbar {
            width: 3px;
        }
        .nav-bar::-webkit-scrollbar-track {
            background: #e0e7ef;
            border-radius: 10px;
        }
        .nav-bar::-webkit-scrollbar-thumb {
            background: #1e88e5;
            border-radius: 10px;
        }

        .nav-divider {
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #b9c8e0, transparent);
            margin: 4px auto;
        }

        .nav-link {
            background: white;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            text-decoration: none;
            cursor: pointer;
            flex-shrink: 0;
        }

        .nav-img {
            width: 24px;
            height: 24px;
            transition: transform 0.2s;
        }

        .nav-link:hover {
            background: #1e88e5;
            width: auto;
            padding: 0 18px 0 14px;
            gap: 10px;
        }

        .nav-link:hover .nav-img {
            transform: scale(1.02);
            filter: brightness(0) invert(1);
        }

        .nav-link:hover::after {
            content: attr(data-label);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: white;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        /* Main container */
        .container {
            max-width: 1200px;
            background: #ffffff;
            margin: 40px auto 40px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12);
            border-radius: 32px;
            padding: 44px 52px;
            transition: all 0.2s;
        }

        /* Page title */
        .page-title {
            font-size: 42px;
            font-weight: 800;
            color: #0a2647;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .page-subtitle {
            text-align: center;
            color: #4a627a;
            font-size: 16px;
            margin-bottom: 40px;
            border-bottom: 2px solid #e6edf4;
            padding-bottom: 20px;
        }

        /* Games grid - matching activity cards style */
        .games-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .game-card {
            background: #fefefe;
            border-radius: 24px;
            padding: 32px 28px;
            border: 1px solid #e2eaf1;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            height: 100%;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .game-card:hover {
            border-color: #bed2e6;
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.08);
            background: #ffffff;
            transform: translateY(-4px);
        }

        .game-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .game-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0a3452;
            margin-bottom: 12px;
        }

        .game-card p {
            color: #4a627a;
            margin-bottom: 24px;
            line-height: 1.5;
            font-size: 14px;
        }

        .play-btn {
            display: inline-block;
            background: #1e88e5;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
            width: fit-content;
            margin: 0 auto;
            border: none;
            cursor: pointer;
        }

        .play-btn:hover {
            background: #156db8;
        }

        .coming-soon {
            opacity: 0.7;
        }

        .coming-soon .play-btn {
            background: #8899aa;
            cursor: not-allowed;
        }

        @media (max-width: 860px) {
            .container { padding: 28px; margin: 20px; }
            .games-container { grid-template-columns: 1fr; }
            .nav-bar { left: 10px; padding: 8px 6px; gap: 6px; height: 50vh; top: 25%; }
            .nav-link { width: 40px; height: 40px; }
            .page-title { font-size: 32px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-title">🎮 My Games</div>
    <div class="page-subtitle">Interactive apps and games built with HTML, CSS, and JavaScript</div>

    <div class="games-container">
        <div class="game-card">
            <div class="game-icon">🚂</div>
            <h2>Stray Cargo</h2>
            <p>A game about catching falling objects while using a train</p>
            <a href="StrayCargo.html" target="_blank" class="play-btn">Launch App →</a>
        </div>

        <div class="game-card">
            <div class="game-icon"></div>
            <h2>Metropolis Forge</h2>
            <p>City building game</p>
            <a href="MetropolisForge.html" class="play-btn">Launch App →</a>
        </div>

        <div class="game-card">
            <div class="game-icon">⚔️</div>
            <h2>Circlehead Hero</h2>
            <p>Fill in description</p>
            <a href="CircleheadHero.html" target="_blank" class="play-btn">Launch App →</a>
        </div>

        <div class="game-card coming-soon">
            <div class="game-icon">❓</div>
            <h2>Unknown</h2>
            <p>Coming soon!</p>
            <button class="play-btn" disabled>Coming Soon</button>
        </div>
    </div>
</div>
</body>
</html>
